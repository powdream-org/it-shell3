[tools]
deno = "2.7.5"
zig = "0.15.2"

[env]
TEST_MODULES = "modules/libitshell3-protocol modules/libitshell3-transport modules/libitshell3-ime modules/libitshell3"

[tasks."test:macos"]
description = "Run all module tests on macOS (Debug)"
run = """
#!/usr/bin/env bash
set -e
for dir in $TEST_MODULES; do
  echo "=== $(basename $dir): Debug ==="
  (cd $dir && zig build test --summary all)
done
"""

[tasks."test:macos:release-safe"]
description = "Run all module tests on macOS (ReleaseSafe)"
run = """
#!/usr/bin/env bash
set -e
for dir in $TEST_MODULES; do
  echo "=== $(basename $dir): ReleaseSafe ==="
  (cd $dir && zig build test -Doptimize=ReleaseSafe --summary all)
done
"""

[tasks."build:docker:zig-kcov-base"]
description = "Build the zig-kcov-base Docker image (kcov + mise)"
run = "docker build -t zig-kcov-base -f Dockerfile.kcov.base ."

[tasks."build:docker:zig-kcov"]
description = "Build the zig-kcov Docker image (kcov + mise + zig)"
run = """
#!/usr/bin/env bash
set -e
docker build -t zig-kcov-base -f Dockerfile.kcov.base .
docker build -t zig-kcov -f Dockerfile.kcov .
"""

[tasks."test:linux"]
description = "Run all module tests in Linux Docker container (Debug)"
run = """
#!/usr/bin/env bash
set -e
docker run --rm --security-opt seccomp=unconfined \
  -e TEST_MODULES="$TEST_MODULES" \
  -v "$(pwd):/workspace" -w /workspace zig-kcov bash -c '
  for dir in $TEST_MODULES; do
    echo "=== $(basename $dir): Debug ==="
    (cd $dir && zig build test --summary all)
  done
'
"""

[tasks."test:linux:release-safe"]
description = "Run all module tests in Linux Docker container (ReleaseSafe)"
run = """
#!/usr/bin/env bash
set -e
docker run --rm --security-opt seccomp=unconfined \
  -e TEST_MODULES="$TEST_MODULES" \
  -v "$(pwd):/workspace" -w /workspace zig-kcov bash -c '
  for dir in $TEST_MODULES; do
    echo "=== $(basename $dir): ReleaseSafe ==="
    (cd $dir && zig build test -Doptimize=ReleaseSafe --summary all)
  done
'
"""

[tasks."test:all"]
description = "Run all tests (macOS Debug + ReleaseSafe + Linux Debug), with coverage by default"
run = """
#!/usr/bin/env bash
set -e
COVERAGE=true
for arg in "$@"; do
  case "$arg" in
    --no-coverage) COVERAGE=false ;;
    --coverage) COVERAGE=true ;;
  esac
done

echo "=== macOS Debug ==="
for dir in $TEST_MODULES; do
  echo "--- $(basename $dir) ---"
  (cd $dir && zig build test --summary all)
done

echo "=== macOS ReleaseSafe ==="
for dir in $TEST_MODULES; do
  echo "--- $(basename $dir) ---"
  (cd $dir && zig build test -Doptimize=ReleaseSafe --summary all)
done

echo "=== Linux Debug ==="
docker run --rm --security-opt seccomp=unconfined \
  -e TEST_MODULES="$TEST_MODULES" \
  -v "$(pwd):/workspace" -w /workspace zig-kcov bash -c '
  for dir in $TEST_MODULES; do
    echo "--- $(basename $dir) ---"
    (cd $dir && zig build test --summary all)
  done
'

if [ "$COVERAGE" = true ]; then
  echo "=== Coverage ==="
  rm -rf coverage
  docker run --rm --security-opt seccomp=unconfined \
    -e TEST_MODULES="$TEST_MODULES" \
    -v "$(pwd):/workspace" -w /workspace zig-kcov \
    bash /workspace/scripts/coverage.sh
fi

echo "=== Format Check ==="
for dir in $TEST_MODULES; do
  (cd $dir && zig fmt --check src/)
done
"""

[tasks."test:coverage"]
description = "Measure code coverage via kcov in Linux Docker container"
run = """
#!/usr/bin/env bash
set -e
rm -rf coverage
docker run --rm --security-opt seccomp=unconfined \
  -e TEST_MODULES="$TEST_MODULES" \
  -v "$(pwd):/workspace" -w /workspace zig-kcov \
  bash /workspace/scripts/coverage.sh
"""
