name: Update Zig Language Reference

on:
  push:
    paths:
      - 'mise.toml'
    branches:
      - main

jobs:
  update-zig-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install mise
        uses: jdx/mise-action@v4.0.1

      - name: Extract Zig version
        id: zig-version
        run: |
          ZIG_VERSION=$(mise current zig)
          echo "version=$ZIG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Fetch Zig docs
        run: ./scripts/fetch-zig-docs.sh "${{ steps.zig-version.outputs.version }}"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet docs/references/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR if changed
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/update-zig-docs-${{ steps.zig-version.outputs.version }}"
          git checkout -b "$BRANCH"
          git add docs/references/
          git commit -m "chore: update Zig language reference for ${{ steps.zig-version.outputs.version }}"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: update Zig language reference for ${{ steps.zig-version.outputs.version }}" \
            --body "Automated update of \`docs/references/${{ steps.zig-version.outputs.version }}/zig-language-reference.html\` triggered by Zig version change in \`mise.toml\`."
